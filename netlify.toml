[build]
  base = "app"
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

  # VITE_* env vars are embedded in the client bundle by design.
  # The YouTube Data API key is restricted via Google Cloud referrer rules,
  # not by hiding, so it's safe to ship in the bundle.
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "VITE_YOUTUBE_API_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
